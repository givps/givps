server {
    # Listens on non-standard port 81, only for local access
    listen 81;
    server_name 127.0.0.1 localhost;

    root /home/vps/public_html;
    index index.php index.html index.htm;

    access_log /var/log/nginx/vps-access.log;
    error_log  /var/log/nginx/vps-error.log warn;
    
    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        # Front controller pattern: try file, then directory, then index.php
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP Processing (using Unix socket for better performance)
    location ~ \.php$ {
        # Adjust the socket path to match your PHP-FPM version (e.g., php8.2-fpm.sock)
        fastcgi_pass   unix:/var/run/php/php-fpm.sock; 
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Block access to hidden files (Security)
    location ~ /\. {
        deny all;
    }

    # Enable Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss application/xml application/x-javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Cache static files (30 days)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}