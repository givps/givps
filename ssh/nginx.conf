user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    # Meningkatkan koneksi per worker untuk traffic tinggi
    worker_connections 4096; 
    multi_accept on;
}

http {
    ## Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    # Timeout 65s sudah cukup, tapi 15s lebih aman untuk mencegah DoS ringan.
    keepalive_timeout 15; 
    types_hash_max_size 2048;
    server_tokens off; # Penting: Sembunyikan versi Nginx

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    ## Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    ## Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any; # Kompresi bahkan untuk respons dari upstream
    gzip_comp_level 6; # Naikkan level kompresi sedikit
    gzip_min_length 256; # Hanya kompresi file di atas 256 bytes
    gzip_types text/plain text/css application/javascript application/x-javascript application/xml application/json;

    ## Upload & Buffer Settings
    client_max_body_size 32M;
    client_header_buffer_size 8m;
    large_client_header_buffers 8 8m;
    # Setting buffer ini sangat besar. Pastikan server memiliki RAM yang cukup.
    fastcgi_buffer_size 8m; 
    fastcgi_buffers 8 8m;
    fastcgi_read_timeout 600;

    ## Real IP (Cloudflare & Imperva/Incapsula)
    # Anda disarankan untuk mengotomatisasi daftar IP ini menggunakan Cron Job!

    # Cloudflare IPv4
    set_real_ip_from 199.27.128.0/21;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/12;
    # Cloudflare IPv6 - PENTING untuk CDN modern!
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:9880::/29;
    set_real_ip_from 2c0f:f248::/32;

    ## Real IP (Incapsula / Imperva)
    set_real_ip_from 199.83.128.0/21;
    set_real_ip_from 198.143.32.0/19;
    set_real_ip_from 149.126.72.0/21;
    set_real_ip_from 103.28.248.0/22;
    set_real_ip_from 45.64.64.0/22;
    set_real_ip_from 185.11.124.0/22;
    set_real_ip_from 192.230.64.0/18;

    # Menggunakan header CF-Connecting-IP
    real_ip_header CF-Connecting-IP;

    ## Security Headers
    # Wajib: HSTS - Mencegah downgrading ke HTTP
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always; 
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    ## Rate Limiting (anti-DDoS ringan)
    limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    ## Include virtual hosts
    include /etc/nginx/conf.d/*.conf;
}